<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>協會法規智慧索引系統</title>
    <!-- PDF.js 的樣式 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
    <link rel="stylesheet" href="styles.css?v=1.4">
</head>
<body>
    <header>
        <div class="logo">
            <h1>協會法規<span>智慧索引</span></h1>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="輸入關鍵字搜尋內文（例如：穩定基金）..." autocomplete="off">
            <button id="search-btn">搜尋</button>
        </div>
    </header>

    <main>
        <aside id="sidebar">
            <h3>快速分類</h3>
            <ul id="category-list">
                <li class="active" data-cat="all">全部法規</li>
                <!-- 動態注入分類 -->
            </ul>
        </aside>

        <section id="results-section">
            <div id="status-bar">
                找到 <span id="count">0</span> 項結果
            </div>
            <div id="results-list">
                <!-- 搜尋結果 -->
                <div class="empty-state">
                    請輸入關鍵字開始搜尋
                </div>
            </div>
        </section>

        <section id="preview-section">
            <div id="preview-header">
                <span id="preview-title">文件預覽</span>
                <div style="display: flex; align-items: center;">
                    <span id="pdf-search-hint" style="display: none; font-size: 0.9rem; color: #f1c40f; margin-right: 15px; font-weight: normal;">
                        <!-- 舊版提示已不需要，保留元素避免報錯 -->
                    </span>
                    <button id="close-preview">關閉</button>
                </div>
            </div>
            <div id="preview-container">
                <div class="preview-placeholder">點擊搜尋結果進行預覽</div>
                <iframe id="preview-frame" src="" frameborder="0"></iframe>
                <div id="docx-viewer"></div>
                <div id="pdf-viewer"></div>
            </div>
        </section>
    </main>

    <!-- 引入 Mammoth (處理 Word) 與 PDF.js (處理 PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="app.js?v=1.4"></script>
</body>
</html>
